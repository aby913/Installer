project_name: terminus-cli
builds:
  - id: linux_amd64 # + linux_amd64
    env:
      - CGO_ENABLED=0
      - GOOS=linux
      - GOARCH=amd64
    binary: terminus-cli
    main: ./cmd/main.go
    goos:
      - linux
    goarch:
      - amd64
    tags:
      - exclude_graphdriver_devicemapper
      - exclude_graphdriver_btrfs
      - containers_image_openpgp
      - linux
    ldflags:
      - -w
      - -s
  - id: darwin_amd64 # + darwin amd64
    env:
      - CGO_ENABLED=0
      - GOOS=darwin
      - GOARCH=amd64
    binary: terminus-cli
    main: ./cmd/main.go
    goos:
      - darwin
    goarch:
      - amd64
    tags:
      - exclude_graphdriver_devicemapper
      - exclude_graphdriver_btrfs
      - containers_image_openpgp
      - darwin
      - amd64
    ldflags:
      - -w
      - -s
dist: ./output
archives:
  - id: terminus-cli
    name_template: "{{ .ProjectName }}-v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    replacements:
      linux: linux
      amd64: amd64
      arm: arm64
    files:
      - none*
checksum:
  name_template: "checksums.txt"
changelog:
  skip: true
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
